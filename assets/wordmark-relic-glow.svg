<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="遗珍重光">
  <defs>
    <linearGradient id="frontBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a8b" />
      <stop offset="100%" stop-color="#103f7a" />
    </linearGradient>
    <linearGradient id="shadowBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c93cc" />
      <stop offset="100%" stop-color="#95a8d8" />
    </linearGradient>
    <filter id="softLift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="0.4" flood-color="#12386b" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect width="760" height="220" fill="none" />

  <g font-family="KaiTi, STKaiti, Kaiti SC, Songti SC, serif" font-size="168" font-weight="700" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">
    <text x="90" y="114" fill="url(#shadowBlue)" opacity="0.95" transform="translate(18,-10)">遗</text>
    <text x="90" y="114" fill="url(#frontBlue)" filter="url(#softLift)">遗</text>

    <text x="282" y="114" fill="url(#shadowBlue)" opacity="0.95" transform="translate(18,-10)">珍</text>
    <text x="282" y="114" fill="url(#frontBlue)" filter="url(#softLift)">珍</text>

    <text x="474" y="114" fill="url(#shadowBlue)" opacity="0.95" transform="translate(18,-10)">重</text>
    <text x="474" y="114" fill="url(#frontBlue)" filter="url(#softLift)">重</text>

    <text x="666" y="114" fill="url(#shadowBlue)" opacity="0.95" transform="translate(18,-10)">光</text>
    <text x="666" y="114" fill="url(#frontBlue)" filter="url(#softLift)">光</text>
  </g>
</svg>